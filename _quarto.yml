project:
  type: website
  output-dir: _site
  resources:
    - jogos/

website:
  title: "xdG:Lab"
  # trocar para https://xdglab.dev quando o domínio estiver no ar
  site-url: "https://gabrielfortes-xdglab.github.io"
  favicon: assets/favicon.svg
  image: assets/og.png
  open-graph: true
  twitter-card: true
  search: false
  navbar:
    pinned: true
    left:
      - text: "Início"
        href: index.qmd
      - text: "Ferramentas"
        href: ferramentas.qmd
      - text: "O que fazemos"
        href: fazemos.qmd
      - text: "Quem somos"
        href: quem.qmd
  page-footer:
    left: "xdG:Lab · xdglab.dev"
    right: "Gabriel Fortes · Leonardo Soares e Silva"

format:
  html:
    theme: theme.scss
    page-layout: full
    toc: false
    lang: pt-BR
    include-after-body: assets/after-body.html
